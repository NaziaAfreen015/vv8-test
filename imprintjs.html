<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImprintJS</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="./vendor/imprint.min.js"></script>
</head>
<body>
  <h1>Fingerprint given by ImprintJS</h1>
  <div class="card">
    <div class="result-box" id="result">Loading...</div>
    <div class="status" id="status">Initializing...</div>
  </div>

  <script src="./common.js"></script>
  <script>
    async function run() {
      try {
        if (!window.ImprintJs) {
          throw new Error("ImprintJs global not found");
        }

        const imprint = new window.ImprintJs();
        const tests = [
          "audio",
          "availableScreenResolution",
          "canvas",
          "colorDepth",
          "cookies",
          "cpuClass",
          "deviceDpi",
          "doNotTrack",
          "indexedDb",
          "installedFonts",
          "language",
          "localStorage",
          "pixelRatio",
          "platform",
          "plugins",
          "processorCores",
          "screenResolution",
          "sessionStorage",
          "timezoneOffset",
          "touchSupport",
          "userAgent",
          "webGl"
        ];

        let result;
        if (typeof imprint.test === "function") {
          result = await imprint.test(tests);
        } else if (typeof imprint.getFingerprint === "function") {
          result = await imprint.getFingerprint(tests);
        } else {
          throw new Error("No supported ImprintJS method found");
        }

        setResult(pickBestId(result), "Done");
      } catch (err) {
        setError(err);
      }
    }

    run();
  </script>
</body>
</html>
