<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThumbmarkJS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <h1>Fingerprint given by ThumbmarkJS</h1>
  <div class="card">
    <div class="result-box" id="result">Loading...</div>
    <div class="status" id="status">Initializing...</div>
  </div>

  <script src="./common.js"></script>
  <script>
    async function run() {
      try {
        await loadScript("https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs/dist/thumbmark.umd.js");

        if (!window.ThumbmarkJS || !window.ThumbmarkJS.Thumbmark) {
          throw new Error("ThumbmarkJS global not found");
        }

        const tm = new window.ThumbmarkJS.Thumbmark();
        const result = await tm.get();
        setResult(pickBestId(result), "Done");
      } catch (err) {
        setError(err);
      }
    }

    run();
  </script>
</body>
</html>
