<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientJS</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ClientJS/0.2.1/client.min.js"></script>
</head>
<body>
  <h1>Fingerprint given by ClientJS</h1>
  <div class="card">
    <div class="result-box" id="result">Loading...</div>
    <div class="status" id="status">Initializing...</div>
  </div>

  <script src="./common.js"></script>
  <script>
    async function run() {
      try {
        if (!window.ClientJS) {
          throw new Error("ClientJS global not found");
        }

        const client = new window.ClientJS();
        const result = client.getFingerprint();
        setResult(String(result), "Done");
      } catch (err) {
        setError(err);
      }
    }

    run();
  </script>
</body>
</html>
