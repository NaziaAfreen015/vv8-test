<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerprintJS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <h1>Fingerprint given by FingerprintJS</h1>
  <div class="card">
    <div class="result-box" id="result">Loading...</div>
    <div class="status" id="status">Initializing...</div>
  </div>

  <script src="./common.js"></script>
  <script type="module">
    async function run() {
      try {
        const FingerprintJS = await import('https://openfpcdn.io/fingerprintjs/v5');
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        setResult(result.visitorId, "Done");
      } catch (err) {
        setError(err);
      }
    }

    run();
  </script>
</body>
</html>
